server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: campus-task-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 50MB
      enabled: true

  jackson:
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: true   # 时间序列化为毫秒时间戳
    default-property-inclusion: non_null

  web:
    resources:
      static-locations: file:./uploads/,classpath:/static/

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:mapper/**/*.xml

# JWT 配置
jwt:
  secret: ${JWT_SECRET:campus_task_jwt_secret_key_2026_must_be_at_least_32_chars}
  expire-days: 7
  short-expire-days: 1

# 平台配置
platform:
  task-min-amount: 1
  task-max-amount: 500
  task-audit-threshold: 200
  grab-lock-minutes: 20
  grab-daily-limit: 5
  violation-daily-limit: 3
  grab-freeze-score: 1

# SpringDoc / Knife4j
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
knife4j:
  enable: true
  setting:
    language: zh_cn
